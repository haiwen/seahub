{% extends 'email_base.html' %}

{% load i18n seahub_tags %}

{% block email_con %}
{% autoescape off %}

<p style="color:#121214;font-size:14px;">{% trans "Hi," %}</p>

<p style="font-size:14px;color:#434144;">
{{name}}，您好：<br />

外部文件 {{filename}} 已经上传成功。

</p>

<p style="font-size:14px;color:#434144;">
文件的下载路径是: <br />
<a href="{{ file_link }}">{{ file_link }}</a>
</p>

{% if extra_msg %}
<p>" {{ extra_msg }} "</p>
{% endif %}

{% endautoescape %}
{% endblock %}
